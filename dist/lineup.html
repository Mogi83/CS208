<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starting Lineup Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="blog dark-mode">
    <nav>
        <ul>
            <li><a href="/" class="nav-button">Homepage</a></li>
            <li><a href="/hometown.html" class="nav-button">Hometown</a></li>
            <li><a href="/rattlesnakes.html" class="nav-button">Rattlesnakes</a></li>
            <li><a href="/loanComparison.html" class="nav-button">Loans</a></li>
        </ul>
    </nav>
    <h1>Starting Lineup</h1>

    <form id="lineupForm">
        <p>
            <fieldset>
                <legend>Status:</legend>
                <input type="radio" id="draft" name="status" value="Draft">
                <label for="draft">Draft</label>
                
                <input type="radio" id="final" name="status" value="Final" checked>
                <label for="final">Final</label>
            </fieldset>
        </p>

        <p>
            <label for="gameDate">Date:</label>
            <select name="gameDate" id="gameDate">
                <option value="March 20">March 20</option>
                <option value="March 24">March 24</option>
                <option value="April 2">April 2</option>
                <option value="April 6">April 6</option>
                <option value="April 13">April 13</option>
            </select>
        </p>

        <p>
            <fieldset>
                <legend>Players:</legend>
                <input type="checkbox" id="p1" name="player" value="Aarav Agarwal">
                <label for="p1">Aarav Agarwal</label><br>
                
                <input type="checkbox" id="p2" name="player" value="Ava Johnson">
                <label for="p2">Ava Johnson</label><br>
                
                <input type="checkbox" id="p3" name="player" value="Julio Ortiz">
                <label for="p3">Julio Ortiz</label><br>
                
                <input type="checkbox" id="p4" name="player" value="Liam Rubio">
                <label for="p4">Liam Rubio</label><br>
                
                <input type="checkbox" id="p5" name="player" value="Emma Witherspoon">
                <label for="p5">Emma Witherspoon</label>
            </fieldset>
        </p>

        <p>
            <input type="submit" value="Submit" id="submitBtn">
        </p>
    </form>

    <div id="displayArea"></div>

    <script src="script.js"></script>
</body>
</html>
